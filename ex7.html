<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercice 7</title>
<style>
button {
  padding: 10px;
  transition: 0.3s;
}
button:hover {
  background: blue;
  color: white;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 5px solid gray;
  border-top: 5px solid black;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<h1>Animation</h1>

<button>Hover me</button>
<div class="spinner"></div>

</body>
</html>
