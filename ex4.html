<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercice 4</title>
<style>
.grid-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

.card {
  background: lightblue;
  padding: 20px;
}

.page-layout {
  display: grid;
  grid-template-areas:
    "header header"
    "sidebar main"
    "footer footer";
  gap: 10px;
}

.header { grid-area: header; background: red; }
.sidebar { grid-area: sidebar; background: yellow; }
.main { grid-area: main; background: green; }
.footer { grid-area: footer; background: gray; }
</style>
</head>
<body>

<h1>Grid</h1>

<div class="grid-cards">
  <div class="card">1</div>
  <div class="card">2</div>
  <div class="card">3</div>
</div>

<h2>Layout</h2>
<div class="page-layout">
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="main">Main</div>
  <div class="footer">Footer</div>
</div>

</body>
</html>
